version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    networks:
      - ratefluencer-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Assuming you will access this locally at http://localhost:5000. 
        # If deploying to a cloud server, change 'localhost' to your server's domain/IP.
        - VITE_API_URL=http://localhost:5000/api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ratefluencer-net
    restart: unless-stopped

networks:
  ratefluencer-net:
    driver: bridge
